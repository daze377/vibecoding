{% extends "base.html" %}
{% block title %}{{ 'Edit post' if post else 'New post' }}{% endblock %}
{% block content %}
  <h1>{{ 'Edit post' if post else 'New post' }}</h1>
  <form method="post" class="form">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
    <label for="title">Title</label>
    <input id="title" name="title" required maxlength="200"
           value="{{ request.form.get('title', post.title if post else '') }}">
    <label for="body">Body</label>
    <textarea id="body" name="body" rows="12" required>{{ request.form.get('body', post.body if post else '') }}</textarea>
    <div class="post-actions">
      <button type="submit">Save</button>
      <a class="button secondary"
         href="{{ url_for('posts.detail', post_id=post.id) if post else url_for('posts.index') }}">Cancel</a>
    </div>
  </form>
{% endblock %}
